<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>計算機</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .calculator {
      background: #16213e;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      width: 320px;
    }

    .display {
      background: #0f3460;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 20px;
      text-align: right;
      min-height: 90px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      overflow: hidden;
    }

    .display .expression {
      font-size: 14px;
      color: #a0aec0;
      min-height: 20px;
      word-break: break-all;
    }

    .display .result {
      font-size: 40px;
      color: #e2e8f0;
      font-weight: 300;
      word-break: break-all;
      line-height: 1.1;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      border: none;
      border-radius: 12px;
      font-size: 20px;
      padding: 18px 0;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.1s;
      font-weight: 500;
      outline: none;
    }

    button:active {
      transform: scale(0.93);
      opacity: 0.85;
    }

    .btn-number {
      background: #1a365d;
      color: #e2e8f0;
    }

    .btn-number:hover { background: #2a4a7f; }

    .btn-operator {
      background: #e94560;
      color: #fff;
    }

    .btn-operator:hover { background: #ff5b7a; }

    .btn-action {
      background: #0f3460;
      color: #a0aec0;
    }

    .btn-action:hover { background: #1a4a80; }

    .btn-equals {
      background: #e94560;
      color: #fff;
      grid-column: span 2;
    }

    .btn-equals:hover { background: #ff5b7a; }

    .btn-zero {
      grid-column: span 2;
    }
  </style>
</head>
<body>
  <div class="calculator" role="application" aria-label="計算機">
    <div class="display">
      <div class="expression" id="expression" aria-live="polite"></div>
      <div class="result" id="result" aria-live="assertive">0</div>
    </div>
    <div class="buttons">
      <!-- Row 1 -->
      <button class="btn-action" data-action="clear" aria-label="清除">AC</button>
      <button class="btn-action" data-action="sign" aria-label="正負號">+/-</button>
      <button class="btn-action" data-action="percent" aria-label="百分比">%</button>
      <button class="btn-operator" data-op="/" aria-label="除以">÷</button>
      <!-- Row 2 -->
      <button class="btn-number" data-digit="7">7</button>
      <button class="btn-number" data-digit="8">8</button>
      <button class="btn-number" data-digit="9">9</button>
      <button class="btn-operator" data-op="*" aria-label="乘以">×</button>
      <!-- Row 3 -->
      <button class="btn-number" data-digit="4">4</button>
      <button class="btn-number" data-digit="5">5</button>
      <button class="btn-number" data-digit="6">6</button>
      <button class="btn-operator" data-op="-" aria-label="減">−</button>
      <!-- Row 4 -->
      <button class="btn-number" data-digit="1">1</button>
      <button class="btn-number" data-digit="2">2</button>
      <button class="btn-number" data-digit="3">3</button>
      <button class="btn-operator" data-op="+" aria-label="加">+</button>
      <!-- Row 5 -->
      <button class="btn-number btn-zero" data-digit="0" aria-label="零">0</button>
      <button class="btn-number" data-action="decimal" aria-label="小數點">.</button>
      <button class="btn-equals" data-action="equals" aria-label="等於">=</button>
    </div>
  </div>

  <script>
    const MAX_DIGITS = 12;

    let state = {
      current: '0',
      previous: null,
      operator: null,
      justEvaluated: false,
      waitingForOperand: false,
    };

    const resultEl = document.getElementById('result');
    const expressionEl = document.getElementById('expression');

    function updateDisplay() {
      resultEl.textContent = formatNumber(state.current);
      if (state.operator && state.previous !== null) {
        const opSymbol = { '+': '+', '-': '−', '*': '×', '/': '÷' }[state.operator];
        expressionEl.textContent = formatNumber(state.previous) + ' ' + opSymbol;
      } else {
        expressionEl.textContent = '';
      }
    }

    function formatNumber(numStr) {
      if (numStr === null || numStr === undefined) return '0';
      // Preserve trailing dot and trailing zeros after dot
      const hasTrailingDot = numStr.endsWith('.');
      const parts = numStr.split('.');
      const intPart = parseInt(parts[0], 10);
      if (isNaN(intPart)) return numStr;
      let formatted = intPart.toLocaleString('zh-TW');
      if (parts.length > 1) {
        formatted += '.' + parts[1];
      } else if (hasTrailingDot) {
        formatted += '.';
      }
      return formatted;
    }

    function inputDigit(digit) {
      if (state.justEvaluated || state.waitingForOperand) {
        state.current = digit;
        state.justEvaluated = false;
        state.waitingForOperand = false;
      } else if (state.current === '0') {
        state.current = digit;
      } else {
        const rawDigits = state.current.replace('.', '').replace('-', '').length;
        if (rawDigits >= MAX_DIGITS) return;
        state.current += digit;
      }
      updateDisplay();
    }

    function inputDecimal() {
      if (state.justEvaluated || state.waitingForOperand) {
        state.current = '0.';
        state.justEvaluated = false;
        state.waitingForOperand = false;
        updateDisplay();
        return;
      }
      if (!state.current.includes('.')) {
        state.current += '.';
      }
      updateDisplay();
    }

    function toggleSign() {
      if (state.current === '0') return;
      state.current = state.current.startsWith('-')
        ? state.current.slice(1)
        : '-' + state.current;
      updateDisplay();
    }

    function percent() {
      const val = parseFloat(state.current);
      if (isNaN(val)) return;
      state.current = String(val / 100);
      state.justEvaluated = false;
      updateDisplay();
    }

    function setOperator(op) {
      if (state.operator && !state.waitingForOperand) {
        evaluate();
      }
      state.previous = state.current;
      state.operator = op;
      state.justEvaluated = false;
      state.waitingForOperand = true;
      updateDisplay();
    }

    function evaluate() {
      if (state.operator === null || state.previous === null) return;
      const prev = parseFloat(state.previous);
      const curr = parseFloat(state.current);
      let result;
      switch (state.operator) {
        case '+': result = prev + curr; break;
        case '-': result = prev - curr; break;
        case '*': result = prev * curr; break;
        case '/':
          if (curr === 0) {
            state.current = 'Error';
            state.operator = null;
            state.previous = null;
            state.justEvaluated = true;
            updateDisplay();
            return;
          }
          result = prev / curr;
          break;
        default: return;
      }
      // Avoid floating-point noise
      const rounded = parseFloat(result.toPrecision(12));
      state.current = String(rounded);
      state.operator = null;
      state.previous = null;
      state.justEvaluated = true;
      updateDisplay();
    }

    function clearAll() {
      state = { current: '0', previous: null, operator: null, justEvaluated: false, waitingForOperand: false };
      updateDisplay();
    }

    // Button click handler
    document.querySelector('.buttons').addEventListener('click', (e) => {
      const btn = e.target.closest('button');
      if (!btn) return;

      if (btn.dataset.digit !== undefined) {
        inputDigit(btn.dataset.digit);
      } else if (btn.dataset.op) {
        setOperator(btn.dataset.op);
      } else {
        switch (btn.dataset.action) {
          case 'clear':   clearAll(); break;
          case 'sign':    toggleSign(); break;
          case 'percent': percent(); break;
          case 'decimal': inputDecimal(); break;
          case 'equals':  evaluate(); break;
        }
      }
    });

    // Keyboard support
    document.addEventListener('keydown', (e) => {
      if (e.key >= '0' && e.key <= '9') inputDigit(e.key);
      else if (e.key === '.') inputDecimal();
      else if (e.key === '+') setOperator('+');
      else if (e.key === '-') setOperator('-');
      else if (e.key === '*') setOperator('*');
      else if (e.key === '/') { e.preventDefault(); setOperator('/'); }
      else if (e.key === 'Enter' || e.key === '=') evaluate();
      else if (e.key === 'Escape') clearAll();
      else if (e.key === 'Backspace') {
        if (state.waitingForOperand) return;
        if (state.current.length > 1) {
          state.current = state.current.slice(0, -1);
        } else {
          state.current = '0';
        }
        state.justEvaluated = false;
        updateDisplay();
      }
    });

    updateDisplay();
  </script>
</body>
</html>
